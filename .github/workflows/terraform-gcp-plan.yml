name: 'Terraform GCP Plan on PR'

on:
  pull_request:
    branches: [ main ]
    paths: [ 'terraform/environments/gcp-dev/**', 'terraform/modules/gcp-*/**' ]

jobs:
  plan:
    name: 'GCP Plan'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.x

      - name: Terraform Init & Plan
        id: plan
        run: |
          cd terraform/environments/gcp-dev
          terraform init
          terraform workspace select gcp-dev || terraform workspace new gcp-dev
          terraform plan -no-color -out=tfplan -var="gcp_project=${{ secrets.GCP_PROJECT_ID }}" -var="db_password=${{ secrets.GCP_DB_PASSWORD }}" 2>&1 | tee plan.txt

      - name: Comment Plan on PR
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/environments/gcp-dev/plan.txt', 'utf8');
            const body = plan.length > 60000 ? plan.slice(-60000) + '\n...truncated' : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### Terraform GCP Dev Plan\n\`\`\`\n${body}\n\`\`\``
            });
