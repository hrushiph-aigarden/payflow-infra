name: 'Terraform Plan on PR'

on:
  pull_request:
    branches: [ main ]
    paths: [ 'terraform/**' ]

jobs:
  plan:
    name: 'Plan [${{ matrix.environment }}]'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    strategy:
      matrix:
        environment: [dev, staging, prod]
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/gha-terraform-${{ matrix.environment }}
          aws-region: us-east-1
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.x
      - name: Terraform Init & Plan
        id: plan
        run: |
          cd terraform/environments/${{ matrix.environment }}
          terraform init
          terraform workspace select ${{ matrix.environment }} || terraform workspace new ${{ matrix.environment }}
          terraform plan -no-color -out=tfplan 2>&1 | tee plan.txt
      - name: Comment Plan on PR
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/environments/${{ matrix.environment }}/plan.txt', 'utf8');
            const body = plan.length > 60000 ? plan.slice(-60000) + '\n...truncated' : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### Terraform Plan \`${{ matrix.environment }}\`\n\`\`\`\n${body}\n\`\`\``
            });
